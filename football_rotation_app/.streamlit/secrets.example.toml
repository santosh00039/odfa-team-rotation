# Copy this file to .streamlit/secrets.toml for local development.
# Never commit .streamlit/secrets.toml.

[security]
approved_coach_emails = [
  "coach@example.com",
]
# Keep false in Streamlit Community Cloud.
# Set true locally only if you have not created Google OAuth credentials yet.
allow_dev_bypass = false
dev_user_email = "coach@example.com"

[auth]
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "replace-with-a-long-random-string"

[auth.google]
client_id = "replace-with-google-client-id"
client_secret = "replace-with-google-client-secret"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"
client_kwargs = { scope = "openid email profile", prompt = "select_account" }

[database]
# Omit database.url locally to use football_rotation_app/data/football.db.

# Streamlit Community Cloud with Supabase:
# 1. Copy the Supabase session pooler URI from Project Settings > Database.
# 2. Use the psycopg SQLAlchemy driver prefix.
# 3. Keep sslmode=require.
# url = "postgresql+psycopg://USER:PASSWORD@HOST:5432/postgres?sslmode=require"
